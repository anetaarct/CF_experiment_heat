website:
  title: "Nest heating experiment in collared flycatchers"
  navbar:
    left:
      - href: index.qmd
        text: Overview
      - href: 01_data_overview.qmd
        text: Data overview
      - href: 02_data_preparation.qmd
        text: Data preparation
      - href: 03_model_strategy.qmd
        text: Model strategy
      - href: 04_distribution_sensitivity.qmd
        text: Distribution sensitivity
      - href: 05_results.qmd
        text: Experiment results
      - href: 06_experiment_interactions.qmd
        text: Experiment interaction
      - href: 07_temperature_models.qmd
        text: Ambient temperature models
      - href: 06_figures.qmd
        text: Figures

resources:
  - data/prepared_nestlings.csv
  - data/prepared_nestlings.rds
  - data/prepared_hatchability_eggs.csv
  - data/prepared_hatchability_eggs.rds
  - CF_exp_all_2026.xlsx
  - models/summary_pdf/*.pdf
  - models/diagnostics/*.pdf
  - models/collinearity/*.csv
  - models/manipulation_check/*.csv
  - models/dispersion_effects/*.csv
  - models/group_contrasts/*.csv
  - figures/model_effects/*
  - figures/raw_distributions/*
  - figures/experiment_interactions/*
  - figures/temperature_interactions/*
  - figures/manipulation_check/*

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-summary: "Show code"
    page-layout: full
    execute:
      warning: false
      message: false

execute:
  freeze: auto

